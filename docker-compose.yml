version: '3.8'

services:
  spay_db:
    image: postgres:16-alpine
    container_name: spay_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spay_redis:
    image: redis:7-alpine
    container_name: spay_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
